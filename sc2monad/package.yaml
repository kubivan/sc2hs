name: sc2monad
version: 0.4.3.0
synopsis: High-level StarCraft II bot framework with StepMonad and game systems
license: MIT
category: Game

dependencies:
  - base >= 4.12
  - sc2api
  - aeson
  - bytestring
  - conduit
  - containers
  - hashable
  - microlens
  - mtl
  - proto-lens
  - text
  - transformers
  - unordered-containers
  - vector
  - template-haskell
  - safe
  - split
  - random
  - async
  - websockets
  - directory
  - lens-aeson
  - process
  - aeson-pretty

library:
  source-dirs: src
  default-extensions:
    - OverloadedStrings
    - OverloadedLabels
    - ImportQualifiedPost
  ghc-options:
    - -Wall
    - -Wcompat
    - -Widentities
    - -Wincomplete-record-updates
    - -Wincomplete-uni-patterns
    - -Wmissing-export-lists
    - -Wmissing-home-modules
    - -Wpartial-fields
    - -Wredundant-constraints
  exposed-modules:
    # Core monadic framework
    - StepMonad
    - StepMonadUtils
    - Observation
    - Units
    - UnitsTh
    - Footprint
    - Utils
    # SC2 modules
    - SC2.TechTree
    - SC2.Utils
    # Grid system
    - SC2.Grid
    - SC2.Grid.Core
    - SC2.Grid.Algo
    - SC2.Grid.Utils
    - SC2.Grid.TilePos
    - SC2.Grid.Distance
    # Units
    - SC2.Units.CombatEval

tests:
  sc2monad-test:
    main: Spec.hs
    source-dirs:
      - test
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N
    dependencies:
      - hspec
      - sc2api
      - sc2monad
